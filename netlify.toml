[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  external_node_modules = ["cheerio"]

# www del dominio de los anuncios → apex (cosmético: los ads usan apex).
[[redirects]]
  from = "https://www.inmobiliariadiegoferreyra.com/*"
  to = "https://inmobiliariadiegoferreyra.com/:splat"
  status = 301
  force = true

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    # SAMEORIGIN (no DENY): el visor de mapa de calor embebe las landings en un
    # iframe same-origin (/embudos/heatmap/*). Sigue bloqueando framing externo.
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # HSTS: fuerza https y evita downgrade/SSL-stripping. El sitio ya sirve 100% TLS
    # (Netlify). Sin includeSubDomains/preload por ahora para no comprometer subdominios
    # que pudieran no estar en https; subir a includeSubDomains + preload cuando se confirme.
    Strict-Transport-Security = "max-age=31536000"
